name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OS deps for opencv
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Skip onnxruntime-gpu in CI; install cpu variant only
          grep -v 'onnxruntime-gpu' requirements.txt > requirements-ci.txt
          echo "onnxruntime>=1.18.0" >> requirements-ci.txt
          pip install -r requirements-ci.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint
        run: ruff check app/ tests/ simulation/

      - name: Test
        run: pytest -v
